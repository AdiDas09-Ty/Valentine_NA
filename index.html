<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Be My Valentine? 💘</title>
  <style>
    :root{
      --bg1:#ffdee9;
      --bg2:#b5fffc;
      --card:#ffffffcc;
      --text:#222;
      --yes:#ff4d6d;
      --yesHover:#ff2f55;
      --no:#444;
      --shadow: 0 12px 40px rgba(0,0,0,.15);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color:var(--text);
      background: radial-gradient(circle at 20% 10%, var(--bg2), transparent 45%),
                  radial-gradient(circle at 80% 30%, var(--bg1), transparent 55%),
                  linear-gradient(135deg, #fff, #ffeaf2);
      overflow:hidden;
      padding:24px;
    }
    .card{
      width:min(520px, 92vw);
      background:var(--card);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,.6);
      border-radius:24px;
      box-shadow: var(--shadow);
      padding:26px 22px 22px;
      position:relative;
      text-align:center;
    }
    h1{
      margin:6px 0 10px;
      font-size:clamp(24px, 4vw, 34px);
      line-height:1.15;
    }
    p{
      margin:0 0 14px;
      opacity:.85;
    }
    .gifWrap{
      width:100%;
      display:flex;
      justify-content:center;
      margin:12px 0 18px;
    }
    img{
      width:min(320px, 80vw);
      height:auto;
      border-radius:18px;
      box-shadow: 0 10px 26px rgba(0,0,0,.12);
      border: 1px solid rgba(255,255,255,.7);
      background:#fff;
    }

    /* Button area */
    .btnArea{
      position:relative;
      height:110px; /* gives space for NO to move inside */
      display:flex;
      align-items:flex-start;
      justify-content:center;
      gap:14px;
      margin-top:8px;
      padding-top:8px;
    }
    button{
      border:none;
      border-radius:999px;
      padding:14px 18px;
      font-size:18px;
      cursor:pointer;
      transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
      box-shadow: 0 10px 18px rgba(0,0,0,.12);
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    button:active{ transform: scale(.98); }
    #yesBtn{
      background: var(--yes);
      color:white;
      min-width:120px;
      font-weight:700;
    }
    #yesBtn:hover{ background: var(--yesHover); }
    #noBtn{
      background: #f3f3f3;
      color: var(--no);
      min-width:120px;
      position:absolute; /* so it can jump within btnArea */
      left: calc(50% + 70px);
      top: 8px;
    }
    .tiny{
      font-size:13px;
      opacity:.7;
      margin-top:10px;
    }
    .hidden{ display:none !important; }

    /* Confetti (simple emoji sprinkle) */
    .confetti{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }
    .confetti span{
      position:absolute;
      font-size:22px;
      animation: fall linear forwards;
      opacity:.95;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,.25));
    }
    @keyframes fall{
      from{ transform: translateY(-10vh) rotate(0deg); }
      to{ transform: translateY(110vh) rotate(540deg); }
    }

    .footerNote{
      margin-top:12px;
      font-size:12px;
      opacity:.6;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1 id="title">Will you be my Valentine, Nitika Arora? 🥺💘</h1>
    <p id="subtitle">Choose wisely.</p>

    <div class="gifWrap">
      <img id="mainGif" alt="cute gif" />
    </div>

    <div class="btnArea" id="btnArea">
      <button id="yesBtn">YES 💖</button>
      <button id="noBtn" aria-label="No button">NO 🙃</button>
    </div>

    <div class="tiny" id="attemptText">PS: Why are you even looking for the NO button?!</div>
    <div class="footerNote">Made with love (and mild emotional blackmail).</div>
  </div>

  <div class="confetti hidden" id="confetti"></div>

  <script>
    // ✅ Put your GIF links here:
    // Tip: use GIF URLs that end in .gif, or a direct media link.
    const BEGGY_GIF = "https://media.tenor.com/rIVI9zKfEcIAAAAM/puppy-dog-eyes-sad.gif";
    const CELEBRATE_GIF = "https://booksparks.com/wp-content/uploads/2018/04/dance-party-dancing-GIF-downsized-1.gif";

    // If you don't want to hunt URLs right now, these are safe placeholders:
    // (But you should replace them with your preferred ones.)
    const fallbackBeggy = "https://media.giphy.com/media/ROF8OQvDmxytW/giphy.gif";
    const fallbackCelebrate = "https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif";

    const gifEl = document.getElementById("mainGif");
    gifEl.src = (BEGGY_GIF.includes("PASTE_") ? fallbackBeggy : BEGGY_GIF);

    const titleEl = document.getElementById("title");
    const subtitleEl = document.getElementById("subtitle");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const btnArea = document.getElementById("btnArea");
    const attemptText = document.getElementById("attemptText");
    const confetti = document.getElementById("confetti");

    let attempts = 0;

    function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

    function moveNoButton() {
      attempts++;

      // Escalation: gets more chaotic over time
      const chaos = clamp(attempts / 10, 0.2, 1);

      const area = btnArea.getBoundingClientRect();
      const btn = noBtn.getBoundingClientRect();

      // Keep inside btnArea and avoid overlapping YES button
      const yesRect = yesBtn.getBoundingClientRect();

      // Compute safe bounds
      const padding = 6;
      const minX = padding;
      const maxX = area.width - btn.width - padding;
      const minY = padding;
      const maxY = area.height - btn.height - padding;

      // Random position, with retries to avoid YES overlap
      let x, y;
      let tries = 0;

      do {
        x = Math.random() * (maxX - minX) + minX;
        y = Math.random() * (maxY - minY) + minY;

        // Add “dramatic teleport” after a few attempts
        if (attempts >= 6 && Math.random() < 0.35 * chaos) {
          x = (Math.random() < 0.5) ? minX : maxX;
          y = (Math.random() < 0.5) ? minY : maxY;
        }

        tries++;
        // Check overlap with YES button (convert to same coordinate space)
        const noLeft = area.left + x;
        const noTop  = area.top + y;
        const noRight = noLeft + btn.width;
        const noBottom = noTop + btn.height;

        const overlap =
          !(noRight < yesRect.left ||
            noLeft > yesRect.right ||
            noBottom < yesRect.top ||
            noTop > yesRect.bottom);

        if (!overlap) break;

      } while (tries < 20);

      noBtn.style.transition = `transform ${0.10 + (0.10 * (1 - chaos))}s ease`;
      noBtn.style.transform = `translate(${x}px, ${y}px)`;

      // Fun little taunts (gentle ones!)
      const lines = [
        "NO is shy 😶‍🌫️",
        "NO said *not today* 🏃‍♂️💨",
        "You sure you don’t mean YES? 😌",
        "NO is on vacation 🌴",
        "Catch me if you can 😼",
        "That button is fighting for its life 😂",
        "It’s giving… impossible 😭"
        "Why are you even looking for the NO button?!"
      ];
      attemptText.textContent = lines[Math.min(attempts-1, lines.length-1)];
    }

    // Desktop: dodge on hover
    noBtn.addEventListener("mouseenter", moveNoButton);

    // Mobile: dodge on touchstart so it moves BEFORE tap registers
    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveNoButton();
    }, { passive:false });

    // Also dodge if someone tries clicking fast
    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      moveNoButton();
    });

    yesBtn.addEventListener("click", () => {
      titleEl.textContent = "YAYYYYY!! 💖💖💖";
      subtitleEl.textContent = "Okay now you’re officially my Valentine 😌";
      gifEl.src = (CELEBRATE_GIF.includes("PASTE_") ? fallbackCelebrate : CELEBRATE_GIF);

      noBtn.classList.add("hidden");
      attemptText.classList.add("hidden");

      launchConfetti();
    });

    function launchConfetti(){
      confetti.classList.remove("hidden");
      confetti.innerHTML = "";

      const emojis = ["💖","💘","💝","💕","✨","🎉","🥳"];
      const count = 70;

      for (let i=0; i<count; i++){
        const s = document.createElement("span");
        s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        const left = Math.random()*100;
        const duration = 1.8 + Math.random()*2.2;
        const delay = Math.random()*0.6;
        const size = 16 + Math.random()*18;

        s.style.left = left + "vw";
        s.style.animationDuration = duration + "s";
        s.style.animationDelay = delay + "s";
        s.style.fontSize = size + "px";
        s.style.top = (-10 - Math.random()*20) + "vh";

        confetti.appendChild(s);

        // Remove after animation
        setTimeout(() => s.remove(), (duration + delay) * 1000 + 200);
      }

      // Hide after a bit
      setTimeout(() => confetti.classList.add("hidden"), 4500);
    }

    // On load, nudge NO once so it feels “alive”
    setTimeout(moveNoButton, 600);
  </script>
</body>
</html>
